name: Automated SAST (Semgrep)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Required for uploading SARIF to GitHub Code Scanning.
permissions:
  contents: read
  security-events: write

jobs:
  semgrep-scan:
    name: Semgrep Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      # Five rulesets:
      #   p/owasp-top-ten   — OWASP Top 10 community rules
      #   p/flask           — Flask-specific rules (debug mode, f-string responses, raw HTML)
      #   p/security-audit  — Additional audit checks including insecure cookie detection
      #   p/python          — Python language security patterns (insecure hash algorithms)
      #   custom-rules.yaml — Org policy: bans hardcoded secret_key and hashlib.sha1()
      - name: Run Semgrep — JSON report
        run: |
          semgrep scan \
            --config="p/owasp-top-ten" \
            --config="p/flask" \
            --config="p/security-audit" \
            --config="p/python" \
            --config="custom-rules.yaml" \
            --json -o semgrep-report.json
        continue-on-error: true

      - name: Run Semgrep — SARIF report
        run: |
          semgrep scan \
            --config="p/owasp-top-ten" \
            --config="p/flask" \
            --config="p/security-audit" \
            --config="p/python" \
            --config="custom-rules.yaml" \
            --sarif -o semgrep-report.sarif
        continue-on-error: true

      - name: Upload Semgrep reports (JSON + SARIF)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-reports
          path: |
            semgrep-report.json
            semgrep-report.sarif
          if-no-files-found: warn

  semgrep-sarif:
    name: SARIF to GitHub Code Scanning
    runs-on: ubuntu-latest
    needs: semgrep-scan

    steps:
      - name: Download Semgrep reports
        uses: actions/download-artifact@v4
        with:
          name: semgrep-reports

      # hashFiles() only considers tracked paths; SARIF is produced in CI, so use a file check.
      - name: Check SARIF present
        id: sarif
        run: |
          if [ -f semgrep-report.sarif ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SARIF to GitHub Code Scanning
        if: steps.sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-report.sarif
          category: semgrep

  semgrep-report-and-gate:
    name: Semgrep Report & Gate
    runs-on: ubuntu-latest
    needs: semgrep-scan

    steps:
      - name: Download Semgrep reports
        uses: actions/download-artifact@v4
        with:
          name: semgrep-reports

      - name: Publish findings to Job Summary
        if: always()
        run: |
          python - <<'EOF'
          import json, os

          path = "semgrep-report.json"
          if not os.path.isfile(path):
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write("## Semgrep SAST Report\n\n_No JSON report found (scan may have failed before output was written)._\n")
              raise SystemExit(0)

          with open(path) as f:
              report = json.load(f)

          results  = report.get("results", [])
          errors   = [r for r in results if r.get("extra", {}).get("severity") == "ERROR"]
          warnings = [r for r in results if r.get("extra", {}).get("severity") == "WARNING"]

          lines = []
          lines.append("## Semgrep SAST Report\n")

          status = "FAILED" if errors else "PASSED"
          lines.append(f"**Build status: {status}**  ")
          lines.append(f"Total findings: **{len(results)}** | ERROR (blocking): **{len(errors)}** | WARNING: **{len(warnings)}**\n")

          if errors:
              lines.append("### ERROR-level Findings (Blocking)\n")
              lines.append("| Rule | File | Line | Message |")
              lines.append("|------|------|:----:|---------|")
              for r in errors:
                  rule = r.get("check_id", "").split(".")[-1]
                  pth = r.get("path", "")
                  line = r.get("start", {}).get("line", "")
                  msg  = r.get("extra", {}).get("message", "")[:120].replace("|", "\\|")
                  lines.append(f"| `{rule}` | `{pth}` | {line} | {msg} |")
              lines.append("")

          if warnings:
              lines.append("### WARNING-level Findings\n")
              lines.append("| Rule | File | Line | Message |")
              lines.append("|------|------|:----:|---------|")
              for r in warnings:
                  rule = r.get("check_id", "").split(".")[-1]
                  pth = r.get("path", "")
                  line = r.get("start", {}).get("line", "")
                  msg  = r.get("extra", {}).get("message", "")[:120].replace("|", "\\|")
                  lines.append(f"| `{rule}` | `{pth}` | {line} | {msg} |")
              lines.append("")

          lines.append("---")
          lines.append("_Full output: `semgrep-reports` artifact (JSON + SARIF). "
                       "SARIF is uploaded to Code Scanning by the **Semgrep SARIF** job._")

          summary = "\n".join(lines)
          print(summary)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(summary + "\n")
          EOF

      - name: Fail build on blocking findings
        run: |
          python - <<'EOF'
          import json, sys, os
          path = "semgrep-report.json"
          if not os.path.isfile(path):
              print("BUILD FAILED: semgrep-report.json missing.")
              sys.exit(1)
          with open(path) as f:
              report = json.load(f)
          errors = [r for r in report.get("results", []) if r.get("extra", {}).get("severity") == "ERROR"]
          if errors:
              print(f"BUILD FAILED: {len(errors)} ERROR-level finding(s).")
              sys.exit(1)
          print("No ERROR-level findings. Build passed.")
          EOF
