name: Generate SBOM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  build-and-push:
    name: Build and Push Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t webapp:${{ github.sha }} .

      - name: Push image to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag webapp:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/webapp:latest
          docker push ghcr.io/${{ github.repository_owner }}/webapp:latest

  generate-sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Generate CycloneDX SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/webapp:latest
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 90

  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: generate-sbom
    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-cyclonedx-${{ github.sha }}

      - name: Scan SBOM for vulnerabilities with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: sbom
          input: sbom.cdx.json
          format: table
          exit-code: '1'
          severity: CRITICAL
