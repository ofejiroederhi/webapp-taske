name: Generate SBOM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sbom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t shopapp:${{ github.sha }} .

      - name: Push image to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag shopapp:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/shopapp:latest
          docker push ghcr.io/${{ github.repository_owner }}/shopapp:latest

      - name: Generate CycloneDX SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: shopapp:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 90

      - name: Scan SBOM for vulnerabilities with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: sbom
          input: sbom.cdx.json
          format: table
          exit-code: '1'
          severity: CRITICAL
